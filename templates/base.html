<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='dashboard.css') }}"
    />
    <script>
      (function () {
        const SIDEBAR_COLLAPSED_KEY = "sidebar_collapsed";
        const savedCollapsed =
          localStorage.getItem(SIDEBAR_COLLAPSED_KEY) === "1";
        if (savedCollapsed) {
          document.documentElement.classList.add("sidebar-is-collapsed");
        }
      })();
    </script>
    {% block extra_head %}{% endblock %}
  </head>

  <body>
    <div class="mobile-header">
      <div
        class="logo"
        style="
          font-size: 1.25rem;
          font-weight: 800;
          color: var(--text-main);
          display: flex;
          align-items: center;
          gap: 0.5rem;
        "
      >
        <i class="fas fa-layer-group"></i> LoanDefault
      </div>
      <div class="mobile-toggle" id="mobile-toggle">
        <i class="fas fa-bars"></i>
      </div>
    </div>

    {% include 'toast.html' %} {% block content %}{% endblock %}
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const themeToggle = document.getElementById("theme-toggle");
        const themeIcon = document.getElementById("theme-icon");
        const themeText = document.getElementById("theme-text");
        const mobileToggle = document.getElementById("mobile-toggle");
        const sidebar = document.querySelector(".sidebar");
        const sidebarClose = document.getElementById("sidebar-close");
        const sidebarCollapse = document.getElementById("sidebar-collapse");
        const SIDEBAR_COLLAPSED_KEY = "sidebar_collapsed";

        if (mobileToggle && sidebar) {
          mobileToggle.addEventListener("click", () => {
            sidebar.classList.toggle("active");
          });
        }

        if (sidebarClose && sidebar) {
          sidebarClose.addEventListener("click", () => {
            sidebar.classList.remove("active");
          });
        }

        document.addEventListener("click", (e) => {
          if (
            sidebar &&
            sidebar.classList.contains("active") &&
            !sidebar.contains(e.target) &&
            !mobileToggle.contains(e.target)
          ) {
            sidebar.classList.remove("active");
          }
        });

        if (sidebar) {
          const isCollapsed = document.documentElement.classList.contains(
            "sidebar-is-collapsed",
          );
          if (isCollapsed) {
            sidebar.classList.add("collapsed");
          }
          if (sidebarCollapse) {
            sidebarCollapse.setAttribute(
              "aria-expanded",
              String(!sidebar.classList.contains("collapsed")),
            );
          }
        }

        if (sidebarCollapse && sidebar) {
          sidebarCollapse.addEventListener("click", () => {
            const nextCollapsed = !sidebar.classList.contains("collapsed");
            sidebar.classList.toggle("collapsed", nextCollapsed);
            document.documentElement.classList.toggle(
              "sidebar-is-collapsed",
              nextCollapsed,
            );
            localStorage.setItem(
              SIDEBAR_COLLAPSED_KEY,
              nextCollapsed ? "1" : "0",
            );
            sidebarCollapse.setAttribute(
              "aria-expanded",
              String(!nextCollapsed),
            );
          });
        }

        if (localStorage.getItem("theme") === "dark") {
          document.body.classList.add("dark-theme");
          if (themeIcon) {
            themeIcon.classList.remove("fa-moon", "far");
            themeIcon.classList.add("fa-sun", "fas");
            themeText.textContent = "Light Mode";
          }
        }

        if (themeToggle) {
          themeToggle.addEventListener("click", () => {
            document.body.classList.toggle("dark-theme");
            const isDark = document.body.classList.contains("dark-theme");
            localStorage.setItem("theme", isDark ? "dark" : "light");

            if (isDark) {
              themeIcon.classList.remove("fa-moon", "far");
              themeIcon.classList.add("fa-sun", "fas");
              themeText.textContent = "Light Mode";
            } else {
              themeIcon.classList.remove("fa-sun", "fas");
              themeIcon.classList.add("fa-moon", "far");
              themeText.textContent = "Dark Mode";
            }
          });
        }
      });
    </script>
  </body>
</html>
